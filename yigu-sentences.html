<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yigú的句子練習</title>
<link rel="stylesheet" href="style.css?v=1">
<style>
  body{padding:24px 16px 60px}
  .yigu-header{width:100%;max-width:480px;text-align:center;margin-bottom:10px}
  .yigu-title{font-size:22px;font-weight:900;color:var(--konpeki);font-family:'Kosugi Maru',sans-serif}
  .yigu-sub{font-size:12px;color:var(--tmid);margin-top:4px}

  .yigu-crosslink{width:100%;max-width:480px;text-align:center;margin-bottom:14px}
  .yigu-crosslink a{font-size:12px;color:var(--misora);font-weight:700;text-decoration:none;border-bottom:1px dashed var(--misora)}

  .yigu-note{width:100%;max-width:480px;background:var(--bg2);border:1px dashed var(--nezumi);border-radius:12px;padding:10px 12px;font-size:11px;color:var(--tmid);margin-bottom:20px;line-height:1.6}

  .cat-block{width:100%;max-width:480px;margin-bottom:26px}
  .cat-title{font-size:15px;font-weight:900;color:var(--konpeki);margin-bottom:10px;padding-left:2px}

  .ex-card{width:100%;background:var(--card);border-radius:18px;box-shadow:0 2px 0 rgba(159,208,222,.5),0 5px 18px rgba(0,91,152,.06);border:1.5px solid rgba(188,225,223,.6);padding:14px 16px;margin-bottom:10px}

  .ex-tag{display:inline-block;font-size:10px;font-weight:800;border-radius:999px;padding:2px 10px;margin-bottom:8px}
  .ex-tag.full{background:rgba(61,184,122,.12);color:var(--ok)}
  .ex-tag.template{background:rgba(228,92,92,.1);color:var(--err)}
  .ex-tag.more{background:rgba(132,145,195,.12);color:var(--benikake)}

  .ex-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ex-sentence{font-size:17px;font-weight:700;color:var(--tdark);line-height:1.6}
  .ex-sentence .blank{color:var(--sora);border-bottom:2px solid var(--sora);padding:0 3px}

  .ex-speak{flex:none;border:none;background:var(--bg2);color:var(--misora);font-size:16px;width:34px;height:34px;border-radius:50%;cursor:pointer;touch-action:manipulation}
  .ex-speak:active{background:var(--usumizu)}
  .ex-speak.playing{animation:pulse .5s ease infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>
</head>
<body>

  <div class="yigu-header">
    <div class="yigu-title">💬 Yigú的句子練習</div>
    <div class="yigu-sub">結構化句型參考——媽媽的公式類推手冊</div>
  </div>

  <div class="yigu-crosslink"><a href="yigu.html">🚗 切換到構音練習頁面 →</a></div>

  <div class="yigu-note">
    ⚠️ 這是<b>媽媽自己看的備忘錄</b>，不是治療師正式教材（治療師的還沒出）。每個句型都是同一種排法：<b>① 完整句</b>（範例）→ <b>② 挖空模板</b>（全部關鍵字挖空，看出句型形狀）→ <b>③④⑤ 舉一反三</b>（同句型、換內容的三個例句），這樣妳可以照這個公式自己延伸出更多句子。之後有正式教材，直接改最下面 <code>CATEGORIES</code> 資料即可。
  </div>

  <div id="content"></div>

<script>
// ── 每個分類：完整句(full) / 全挖空模板(template) / 舉一反三三句(more[]) ──
// 治療師教材來了之後，直接改這份資料，其他程式碼不用動。
const CATEGORIES = [
  {
    title: '① 身份問答',
    full: '你是誰？我是媽媽。',
    template: '你是誰？我是{{blank}}。',
    more: [
      '你是誰？我是爸爸。',
      '這是誰的車車？這是Yigú的車車。',
      '誰在哭？妹妹在哭。'
    ]
  },
  {
    title: '② 因果表達（因為‧所以‧我想要）',
    full: '因為妹妹搶走我的玩具，所以我不高興，我想要媽媽抱抱。',
    template: '因為{{blank}}，所以我{{blank}}，我想要{{blank}}。',
    more: [
      '因為肚子餓了，所以我不舒服，我想要吃東西。',
      '因為很累了，所以我想休息，我想要睡覺覺。',
      '因為找不到車車，所以我很著急，我想要媽媽幫忙。'
    ]
  },
  {
    title: '③ 情緒因果（治療師建議官方句型：情緒在前）',
    full: '我很生氣，因為玩具被搶走了。',
    template: '我{{blank}}，因為{{blank}}。',
    more: [
      '我很高興，因為要去公園。',
      '我很難過，因為車車壞掉了。',
      '我很緊張，因為要看醫生。'
    ]
  },
  {
    title: '④ 地點方位',
    full: '車車現在在房間。',
    template: '{{blank}}現在在{{blank}}。',
    more: [
      '妹妹現在在客廳。',
      '奇奇現在在車庫。',
      '媽媽現在在廚房。'
    ]
  },
  {
    title: '⑤ 時間',
    full: '現在是早上，我要吃早餐了。',
    template: '現在是{{blank}}，我要{{blank}}了。',
    more: [
      '現在是中午，我要吃午餐了。',
      '現在是晚上，我要睡覺了。',
      '現在是下午，我要玩車車了。'
    ]
  },
  {
    title: '⑥ 原因表達',
    full: '我哭哭，是因為我想睡覺。',
    template: '我哭哭，是因為我{{blank}}。',
    more: [
      '我哭哭，是因為肚子餓。',
      '我哭哭，是因為跌倒了。',
      '我哭哭，是因為玩具壞掉了。'
    ]
  },
  {
    title: '⑦ 為什麼',
    full: '你為什麼哭？因為我的車車不見了。',
    template: '你為什麼哭？因為{{blank}}。',
    more: [
      '你為什麼笑？因為卡通很好笑。',
      '你為什麼生氣？因為妹妹弄壞我的積木。',
      '你為什麼不吃飯？因為我不餓。'
    ]
  },
  {
    title: '⑧ 怎麼了',
    full: '你怎麼了？我的膝蓋痛痛的。',
    template: '你怎麼了？{{blank}}。',
    more: [
      '你怎麼了？我肚子不舒服。',
      '你怎麼了？我找不到我的鞋子。',
      '你怎麼了？我睡不著。'
    ]
  },
  {
    title: '⑨ 什麼事',
    full: '發生什麼事了？我的車車壞掉了。',
    template: '發生什麼事了？{{blank}}。',
    more: [
      '發生什麼事了？哥哥把門關起來了。',
      '發生什麼事了？外面在下雨。',
      '發生什麼事了？我不小心打翻水了。'
    ]
  },
  {
    title: '⑩ 在哪裡',
    full: '車車在哪裡？車車在房間裡。',
    template: '車車在哪裡？車車在{{blank}}。',
    more: [
      '奇奇在哪裡？奇奇在客廳。',
      '媽媽在哪裡？媽媽在廚房。',
      '鞋子在哪裡？鞋子在門口。'
    ]
  },
  {
    title: '⑪ 什麼時候',
    full: '我們什麼時候要出門？我們等一下要出門。',
    template: '我們什麼時候要出門？我們{{blank}}要出門。',
    more: [
      '我們什麼時候要吃飯？我們現在要吃飯。',
      '我們什麼時候要睡覺？我們晚上要睡覺。',
      '我們什麼時候要去公園？我們明天要去公園。'
    ]
  },
  {
    title: '⑫ 今天昨天明天',
    full: '今天我們要去公園。',
    template: '{{blank}}我們要去公園。',
    more: [
      '昨天我玩了車車。',
      '明天要去上學。',
      '今天天氣很好。'
    ]
  }
];

function escapeHtml(s){
  return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function templateToHtml(tpl){
  return escapeHtml(tpl).split('{{blank}}').join('<span class="blank">＿＿</span>');
}

function makeCard(tagClass, tagText, sentenceHtml, speakText){
  const card = document.createElement('div');
  card.className = 'ex-card';

  const tag = document.createElement('span');
  tag.className = 'ex-tag ' + tagClass;
  tag.textContent = tagText;

  const row = document.createElement('div');
  row.className = 'ex-row';

  const sentence = document.createElement('div');
  sentence.className = 'ex-sentence';
  sentence.innerHTML = sentenceHtml;

  const btn = document.createElement('button');
  btn.className = 'ex-speak';
  btn.textContent = '🔊';
  btn.addEventListener('click', () => speak(btn, speakText));

  row.appendChild(sentence);
  row.appendChild(btn);
  card.appendChild(tag);
  card.appendChild(row);
  return card;
}

function render(){
  const wrap = document.getElementById('content');
  wrap.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'cat-block';

    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = cat.title;
    block.appendChild(title);

    block.appendChild(makeCard('full', '① 完整句', escapeHtml(cat.full), cat.full));
    block.appendChild(makeCard('template', '② 挖空模板', templateToHtml(cat.template), cat.full));
    cat.more.forEach(s => {
      block.appendChild(makeCard('more', '③④⑤ 舉一反三', escapeHtml(s), s));
    });

    wrap.appendChild(block);
  });
}

// ── 簡易 TTS（純中文）──
let ttsVoice = null;
function initTTS(){
  if(!window.speechSynthesis) return;
  function pickVoice(){
    const voices = speechSynthesis.getVoices();
    ttsVoice = voices.find(v => v.lang === 'zh-TW')
      || voices.find(v => v.lang.startsWith('zh'))
      || null;
  }
  if(speechSynthesis.getVoices().length > 0) pickVoice();
  speechSynthesis.addEventListener('voiceschanged', pickVoice);
}
function speak(btn, text){
  if(!window.speechSynthesis || !text) return;
  try{ speechSynthesis.cancel(); }catch(e){}
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-TW';
  utt.rate = 0.85;
  utt.pitch = 1.0;
  if(ttsVoice) utt.voice = ttsVoice;
  if(btn) btn.classList.add('playing');
  utt.onend = utt.onerror = () => { if(btn) btn.classList.remove('playing'); };
  setTimeout(() => { try{ speechSynthesis.speak(utt); }catch(e){} }, 0);
}

initTTS();
render();
</script>
</body>
</html>
